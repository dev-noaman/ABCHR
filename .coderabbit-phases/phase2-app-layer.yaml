# Phase 2: App Layer - Models, Services, Libraries, Console (~200 files)
# Copy to .coderabbit.yaml, commit, push main, comment @coderabbitai full review
# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: en-US
early_access: false
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  path_filters:
    - '!node_modules/**'
    - '!vendor/**'
    - '!dist/**'
    - '!build/**'
    - '!*.min.js'
    - '!*.min.css'
    - '!package-lock.json'
    - '!composer.lock'
    - '!Adel/**'
    - '!.playwright-cli/**'
    - '!.cursor/**'
    - '!.claude/**'
    - '!.agents/**'
    - '!main-file/**'
    - '!**/*.log'
    - '!**/*.zip'
    - '!**/*.dll'
    - '!**/*.png'
    - '!**/*.db'
    # Phase 2: app/Models, Services, Libraries, Console - exclude the rest
    - '!database/**'
    - '!app/Http/**'
    - '!app/Providers/**'
    - '!app/Observers/**'
    - '!app/Helpers/**'
    - '!app/Traits/**'
    - '!app/PathGenerators/**'
    - '!app/Events/**'
    - '!app/Listeners/**'
    - '!app/Mail/**'
    - '!resources/**'
    - '!public/**'
    - '!tests/**'
    - '!.specify/**'
    - '!read/**'
    - '!storage/**'
    - '!bootstrap/**'
  auto_review:
    enabled: true
    drafts: false
  tools:
    biome:
      enabled: true
    shellcheck:
      enabled: true
    yamllint:
      enabled: true
