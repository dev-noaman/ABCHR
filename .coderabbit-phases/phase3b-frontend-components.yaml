# Phase 3b: Frontend - resources/js/components (~149 files)
# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: en-US
early_access: false
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  path_filters:
    - '!node_modules/**'
    - '!vendor/**'
    - '!dist/**'
    - '!build/**'
    - '!*.min.js'
    - '!*.min.css'
    - '!package-lock.json'
    - '!composer.lock'
    - '!Adel/**'
    - '!.playwright-cli/**'
    - '!.cursor/**'
    - '!.claude/**'
    - '!.agents/**'
    - '!main-file/**'
    - '!**/*.log'
    - '!**/*.zip'
    - '!**/*.dll'
    - '!**/*.png'
    - '!**/*.db'
    - '!database/**'
    - '!app/**'
    - '!resources/lang/**'
    - '!public/**'
    - '!tests/**'
    - '!.specify/**'
    - '!read/**'
    - '!storage/**'
    - '!bootstrap/**'
    - '!resources/js/pages/**'
    - '!resources/js/utils/**'
    - '!resources/js/hooks/**'
    - '!resources/js/config/**'
    - '!resources/js/layouts/**'
    - '!resources/js/types/**'
    - '!resources/js/contexts/**'
    - '!resources/js/helpers/**'
    - '!resources/js/lib/**'
    - '!resources/views/**'
    - '!resources/css/**'
  auto_review:
    enabled: true
    drafts: false
  tools:
    biome:
      enabled: true
    shellcheck:
      enabled: true
    yamllint:
      enabled: true
