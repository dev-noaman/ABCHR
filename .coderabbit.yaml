# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# Full codebase review - Phase 1: Backend Core (app/Http, config, routes)
# Rotate path_filters per plan for Phases 2-4, then trigger @coderabbitai full review
language: en-US
early_access: false
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  path_filters:
    # Standard exclusions (from guide)
    - '!node_modules/**'
    - '!vendor/**'
    - '!dist/**'
    - '!build/**'
    - '!*.min.js'
    - '!*.min.css'
    - '!package-lock.json'
    - '!composer.lock'
    # ABCHR-specific exclusions
    - '!Adel/**'
    - '!.playwright-cli/**'
    - '!.cursor/**'
    - '!.claude/**'
    - '!.agents/**'
    - '!main-file/**'
    - '!**/*.log'
    - '!**/*.zip'
    - '!**/*.dll'
    - '!**/*.png'
    - '!**/*.db'
    # Phase 1: exclude everything except app/Http, config, routes (~203 files)
    - '!database/**'
    - '!app/Models/**'
    - '!app/Libraries/**'
    - '!app/Services/**'
    - '!app/Providers/**'
    - '!app/Console/**'
    - '!app/Observers/**'
    - '!app/Helpers/**'
    - '!app/Traits/**'
    - '!app/PathGenerators/**'
    - '!app/Events/**'
    - '!app/Listeners/**'
    - '!app/Mail/**'
    - '!resources/**'
    - '!public/**'
    - '!tests/**'
    - '!.specify/**'
    - '!read/**'
    - '!storage/**'
    - '!bootstrap/**'
  auto_review:
    enabled: true
    drafts: false
  tools:
    biome:
      enabled: true
    shellcheck:
      enabled: true
    yamllint:
      enabled: true
